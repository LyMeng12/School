server:
  port: 8080

spring:
  application:
    name: School-api

  datasource:
    url: jdbc:postgresql://localhost:5432/school_api
    password: 12345
    username: admin

  jpa:
    hibernate:
      ddl-auto: create-drop

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: on
